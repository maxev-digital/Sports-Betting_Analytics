<!DOCTYPE html>
<html>
<head>
  <title>Icon Preview</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1e293b;
      gap: 40px;
    }
    .preview {
      text-align: center;
    }
    .preview h3 {
      color: white;
      margin-bottom: 20px;
    }
    img {
      border: 2px solid #3b82f6;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="preview">
    <h3>16x16</h3>
    <img src="icon.svg" width="16" height="16">
  </div>
  <div class="preview">
    <h3>32x32</h3>
    <img src="icon.svg" width="32" height="32">
  </div>
  <div class="preview">
    <h3>48x48</h3>
    <img src="icon.svg" width="48" height="48">
  </div>
  <div class="preview">
    <h3>128x128</h3>
    <img src="icon.svg" width="128" height="128">
  </div>
</body>
</html>
