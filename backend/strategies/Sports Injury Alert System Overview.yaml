5. Post-Processing Scoring (Python Snippet)python

import re
from datetime import datetime

CRITICAL_WORDS = re.compile(r'\b(ruled out|placed on IR|season[-\s]?ending|torn\s+(ACL|Achilles)|broken|surgery|out\s+(?:for\s+season|indefinitely))\b', re.I)
HIGH_WORDS     = re.compile(r'\b(out|will miss|sidelined|unavailable|scratched|not\s+(?:playing|suiting\s+up))\b', re.I)
MEDIUM_WORDS   = re.compile(r'\b(doubtful|game[-\s]?time\s+decision|GTD|50/50)\b', re.I)

def score_tweet(text: str) -> dict:
    text_lower = text.lower()
    score = 0
    alert = None

    if CRITICAL_WORDS.search(text_lower):
        score = 100
        alert = "CRITICAL"
    elif HIGH_WORDS.search(text_lower):
        score = 90
        alert = "HIGH"
    elif MEDIUM_WORDS.search(text_lower):
        score = 70
        alert = "MEDIUM"
    else:
        score = 40
        alert = "LOW"

    # Deduct for noise
    noise = len(re.findall(r'\b(fan|update|report|source|says|per|according|team|announces|expected|return|practiced)\b', text_lower))
    score = max(0, score - noise * 15)

    return {"alert": alert, "score": score, "trigger": alert if score >= 70 else None}

Use case:  score >= 90 → auto-bet edge (e.g., pull player prop line)  
70-89 → manual review or model input  
< 70 → log & ignore

