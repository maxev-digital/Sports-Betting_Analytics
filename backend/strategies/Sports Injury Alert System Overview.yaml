  How It Works

  The system scans these 24 reporters every 60 seconds, searching for injury keywords like:     
  - CRITICAL: "ruled out", "placed on IR", "season-ending", "torn ACL"
  - HIGH: "out", "will miss", "sidelined", "unavailable"
  - MEDIUM: "doubtful", "game-time decision"
  - LOW: "questionable", "day-to-day"

  When an injury is detected, it's forwarded to the injury monitor which analyzes if
  sportsbooks are overreacting and creates cascade betting opportunities.

  Rate Limits for Your 24-Reporter Monitoring SetupYour proposed polling approach—scanning all 24 reporters every 60 seconds for injury keywords (e.g., via API calls to fetch recent tweets or search for matches)—relies heavily on read endpoints like GET /2/users/:id/tweets (user timeline) or GET /2/tweets/search/recent (recent search with user filters). This could generate 24 requests per minute (1,440 per hour), which quickly hits limits on lower tiers due to the 15-minute reset windows. Below, I'll break down the relevant limits based on current X API v2 tiers (as of November 2025; no major changes since mid-2024). These are for app context (Bearer Token auth, ideal for automated monitoring) unless noted.Limits focus on key endpoints for your use case:User Timeline (GET /2/users/:id/tweets): Fetches tweets from a specific reporter's account (e.g., since last poll).
Recent Search (GET /2/tweets/search/recent): Searches for keywords across your reporters (e.g., query: ("ruled out" OR out OR doubtful) (from:ShamsCharania OR from:wojespn ...)—one call covers all 24).
Filtered Stream (GET /2/tweets/search/stream): Real-time push for matching tweets (setup rules once, then connect—no polling).

