2. Final Keyword Set (Grouped by Priority)text

# CRITICAL — instant line killer
CRITICAL = ruled out | placed on IR | season-ending | torn ACL | torn Achilles | broken | surgery | out for season | out indefinitely

# HIGH — 90 %+ chance of missing game
HIGH = out | will miss | sidelined | unavailable | scratched | not playing | not suiting up

# MEDIUM — probable miss / GTD
MEDIUM = doubtful | game-time decision | GTD | 50/50

# LOW — monitor but not bet-critical
LOW = questionable | day-to-day | limited in practice | DNP-CD | DNP-rest

